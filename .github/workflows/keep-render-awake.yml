name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -z "$RENDER_BACKEND_URL" ]; then
            echo "Missing RENDER_BACKEND_URL repository secret."
            echo "Set it to your Render backend URL, for example: https://your-service.onrender.com"
            exit 1
          fi

          curl --fail --silent --show-error --max-time 30 "$RENDER_BACKEND_URL/health"
