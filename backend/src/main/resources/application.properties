# --- PostgreSQL DB connection ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dyslexialearn}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Hibernate JPA config ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Data SQL Initialization ---
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Render provides PORT dynamically. Locally this falls back to 8080.
server.port=${PORT:8080}













































